<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Node Terminal</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor con efecto de aluminio cepillado en el borde */
        .frame {
            border: 10px solid #d1d1d1;
            border-radius: 5px;
            padding: 20px;
            background: black;
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.2), 0 0 20px rgba(0, 0, 0, 0.5);
            width: 80%;
            max-width: 600px;
            position: relative;
        }

        /* Efecto de línea de escaneo (como los monitores CRT) */
        .frame::before {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: #00ff41;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        h1 {
            font-size: 1.5rem;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
        }

        p {
            line-height: 1.6;
        }

        .stats {
            color: #e5f50c;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <style>
        #btn-start:hover {
            background: #00ff41 !important;
            color: black !important;
            box-shadow: 0 0 15px #00ff41;
        }
    </style>

    <div id="btn-start"
        style="cursor: pointer; border: 2px solid #00ff3c; padding: 15px 30px; font-size: 1.2rem; background: rgba(0,255,65,0.1); text-align: center; transition: 0.3s; color: #00ff41; font-family: 'Courier New', Courier, monospace;">
        > INICIALIZAR_SISTEMA <br>
        <span style="font-size: 0.8rem; opacity: 0.7;">(Haz clic para activar el terminal y el audio)</span>
    </div>

    <div class="frame" style="display: none;">
        <h1>> AWS_S3_BUCKET_ESTABLISHED</h1>
        <p id="typing-text"></p>
        <span class="cursor"></span>

        <div class="stats">
            <br>
            [SISTEMA]: nazi <br>
            [UBICACIÓN]: Santa Rosa de Cabal, CO <br>
            [PROYECTO]: horno tipo aleman... <br>
            [STATUS]: Esperando victoria de cepeda...
        </div>
    </div>

    <script>
        const text = "Bienvenido al nodo central. Archivos alojados en la nube de AWS con éxito. Optimizando parámetros de movimiento y sistemas embebidos... Conexión segura finalizada.";
        let i = 0;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                // Inicializar el contexto de audio
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep() {
            if (!audioCtx) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Forma de onda cuadrada para sonido retro (8 bits)
            oscillator.type = 'square';

            // Frecuencia variable para que no suene robótico, entre 600 y 800 Hz
            oscillator.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);

            // Volumen cortito y sutil (decay rápido)
            gainNode.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.05);
        }

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);

                // Sonido de clic en cada letra, exceptuando los espacios
                if (text.charAt(i) !== ' ') {
                    playBeep();
                }

                i++;
                // Le damos una velocidad aleatoria para que parezca alguien tecleando (entre 20ms y 70ms)
                let speed = Math.random() * 50 + 20;
                setTimeout(typeWriter, speed);
            }
        }

        // Los navegadores bloquean el sonido si no hay interacción del usuario. 
        // Por eso pedimos que haga un clic primero.
        document.getElementById("btn-start").addEventListener("click", function () {
            this.style.display = "none";
            document.querySelector(".frame").style.display = "block";
            initAudio();
            typeWriter();
        });
    </script>

</body>

</html>
